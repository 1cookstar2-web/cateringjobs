name: Refresh jobs every 10 minutes

# Runs on GitHub's free runners (public repo = unlimited minutes) — nothing runs
# on your own server. Regenerates jobs.json, which the static site polls.
# Any API key lives ONLY in repo Secrets (server-side) — never on the website.

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 minutes (UTC); GitHub schedules are best-effort
  workflow_dispatch: {}       # lets you (or me) trigger a run on demand

# No `push` trigger → the bot's own jobs.json commit will not re-trigger this.
permissions:
  contents: write
concurrency:
  group: refresh-jobs
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Fetch + filter jobs
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: node scripts/fetch-jobs.js
      - name: Commit refreshed jobs.json (race-safe)
        run: |
          git config user.name "cateringjobs-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Robust against concurrent pushes: re-base our regenerated jobs.json onto
          # the latest origin and retry, so a push race never fails the run.
          for i in 1 2 3 4 5; do
            git fetch -q origin main
            git reset -q --soft origin/main        # keep our regenerated jobs.json, on top of latest origin
            git add jobs.json
            if git diff --cached --quiet; then
              echo "jobs.json matches origin — nothing to push."; exit 0
            fi
            git commit -q -m "data: refresh jobs.json [skip ci]"
            if git push -q origin HEAD:main; then echo "pushed on attempt $i"; exit 0; fi
            echo "push race on attempt $i — retrying…"; sleep $((i * 3))
          done
          echo "::error::could not push jobs.json after 5 attempts"; exit 1
